<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hablemos mi loba 💖</title>

<style>
html, body{
  margin:0;
  padding:0;
  height:100%;
  overflow:hidden; /* 🔴 SIN SCROLL */
}

body{
  background:linear-gradient(135deg,#ffd6eb,#fff0c9);
  font-family:"Comic Sans MS", cursive;
  color:#ff4d94;
  text-align:center;
  display:flex;
  flex-direction:column;
}

/* ===== HEADER ===== */
header{
  background:#ffe6f2;
  padding:12px 10px;
  box-shadow:0 4px 10px rgba(255,105,180,.4);
}

header h1{
  font-size:1.2em;
  color:#ff1493;
  text-shadow:2px 2px white;
  margin:6px 0;
}

/* ===== BOTONES ===== */
button{
  background:#ffb6d9;
  border:none;
  padding:10px 16px;
  border-radius:20px;
  font-size:14px;
  color:white;
  margin:4px;
}

/* ===== COLLAGE GRID ===== */
.collage-grid{
  flex:1; /* ocupa toda la pantalla restante */
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  grid-template-rows: repeat(4, 1fr);
  gap:6px;
  padding:6px;
}

.collage-grid img{
  width:100%;
  height:100%;
  object-fit:cover;
  border-radius:18px;
  box-shadow:0 6px 14px rgba(255,105,180,.4);
}

/* ===== TEXTO FINAL ===== */
.big-text{
  font-size:1.6em;
  font-family:Arial, Helvetica, sans-serif;
  color:#ff1493;
  text-shadow:2px 2px white;
  padding:6px;
}
</style>
</head>

<body>

<!-- 🎵 MÚSICA CUTE -->
<audio id="music" loop>
  <source src="https://cdn.pixabay.com/audio/2023/05/09/audio_5c8c8b9c7a.mp3" type="audio/mpeg">
</audio>

<header>
  <h1>
    💕 Hablemos mi loba, hermosa, preciosa, bella, guapa, única, perfecta 💕
  </h1>
  <button onclick="document.getElementById('music').play()">▶️ Play música cute</button>
  <button onclick="document.getElementById('music').pause()">⏸️ Pause</button>
</header>
